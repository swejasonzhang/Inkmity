name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (tests + DB integration)
    # 22.04 has the most reliable mongodb-memory-server binary compatibility.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Runs the default unit suite (green).
      # TODO: the DB-gated integration tests (run with DATABASE_AVAILABLE=true via
      # mongodb-memory-server) cover the booking/billing money flow but are
      # currently STALE — several have drifted from the code and fail. Repair
      # them, then add `env: { DATABASE_AVAILABLE: "true" }` here so they gate CI
      # before launch. This is the highest-value pre-production test work.
      - run: npm test

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
