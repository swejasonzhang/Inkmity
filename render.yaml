# Render blueprint for Inkmity — backend web service only.
# The frontend is hosted on Vercel, so no static site is defined here.
# Secrets are NOT in this file — set them in the Render dashboard (Environment
# tab). See DEPLOYMENT.md for the full checklist.
services:
  # --- Backend: Express + Socket.io (long-running; do NOT use serverless) ---
  - type: web
    name: inkmity-api
    runtime: node
    rootDir: backend
    # Keep the API in the same US-East region as the MongoDB Atlas cluster to
    # minimize DB round-trip latency. (Region can't be changed after creation.)
    region: ohio
    # Always-on plan: keeps Socket.io connections alive and avoids cold-start
    # delays on Stripe webhooks / first requests. The free plan spins down after
    # ~15m idle (~50s cold start), which breaks both — don't use it in production.
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "3001"
      # Secrets / connections — set these in the dashboard (sync:false keeps them
      # out of git and out of preview environments).
      - key: MONGO_URI
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      # Publishable key — the code reads the VITE_-prefixed name on the backend too.
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Cloudinary is configured via a single CLOUDINARY_URL (cloudinary://key:secret@cloud).
      - key: CLOUDINARY_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      # URLs — APP_URL/FRONTEND_URL must be the deployed frontend origin.
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Platform economics: fee = base + pct of price, capped. ($10 + 5%, max $50)
      - key: PLATFORM_FEE_BASE_CENTS
        value: "1000"
      - key: PLATFORM_FEE_PCT
        value: "0.05"
      - key: PLATFORM_FEE_CAP_CENTS
        value: "5000"
      - key: STUDIO_DEFAULT_COMMISSION_PCT
        value: "0.30"
      - key: BIRTHDAY_CREDIT_CENTS
        value: "1500"
      # Comma-separated Clerk IDs allowed to verify studios / grant credits.
      - key: ADMIN_CLERK_IDS
        sync: false
      # Observability — Sentry stays disabled until SENTRY_DSN is set.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      # Redis (Key Value) — powers the Socket.io adapter, a shared cache, and a
      # shared rate-limit store so the API can run on more than one instance.
      # When unset, the app cleanly falls back to per-instance in-memory state
      # (correct for a single instance). Wired from the keyvalue service below.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: inkmity-redis
          property: connectionString
      # Set to "true" ONLY when running more than one instance: forces Socket.io
      # to websocket-only so the polling handshake doesn't bounce across
      # instances (Render has no sticky sessions). The frontend socket client
      # must then also use transports: ["websocket"]. Harmless at 1 instance.
      - key: SOCKET_WS_ONLY
        value: "false"
    # --- Horizontal scaling (requires a Standard+ plan; starter = 1 instance) ---
    # To scale out: raise `plan`, uncomment `scaling`, and set SOCKET_WS_ONLY=true.
    # The Redis-backed adapter/cache/rate-limit above make >1 instance correct.
    # scaling:
    #   minInstances: 2
    #   maxInstances: 5
    #   targetCPUPercent: 70

  # --- Redis / Key Value: Socket.io adapter + shared cache + rate-limit store ---
  - type: keyvalue
    name: inkmity-redis
    region: ohio
    # `starter` is a small paid always-on instance; use `free` for staging.
    plan: starter
    # Internal-only: no public ingress, reachable from the API service via the
    # private network. Empty allow-list blocks all external connections.
    ipAllowList: []
    # The cache tolerates eviction (it just re-reads from Mongo); LRU keeps the
    # most-used keys hot. Rate-limit/adapter keys are short-lived.
    maxmemoryPolicy: allkeys-lru
