<!DOCTYPE html>
<html lang="en" class="ink-scope" data-ink="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>Inkmity — Book Tattoo Artists, Explore Styles, Chat &amp; Schedule</title>
    <meta
      name="description"
      content="Inkmity connects tattoo clients, artists, and studios — discover artists by style, message with full context, and book with transparent on-platform pricing, deposits, and rewards."
    />
    <link rel="canonical" href="https://inkmity.com/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Inkmity" />
    <meta property="og:title" content="Inkmity — Book Tattoo Artists, Explore Styles, Chat & Schedule" />
    <meta
      property="og:description"
      content="Discover tattoo artists by style, message with full context, and book with transparent pricing and rewards."
    />
    <meta property="og:url" content="https://inkmity.com/" />
    <meta property="og:image" content="https://inkmity.com/favicon.ico" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Inkmity — Book Tattoo Artists, Explore Styles, Chat & Schedule" />
    <meta
      name="twitter:description"
      content="Discover tattoo artists by style, message with full context, and book with transparent pricing and rewards."
    />
    <meta name="twitter:image" content="https://inkmity.com/favicon.ico" />
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          var themed = /^\/(dashboard|profile|appointments|portfolio)(\/|$)/.test(path);
          var stored = localStorage.getItem("inkmity-theme") || localStorage.getItem("dashboard-theme");
          var theme = themed && stored === "light" ? "light" : "dark";
          var html = document.documentElement;
          if (theme === "light") {
            html.classList.add("ink-light");
            html.setAttribute("data-ink", "light");
            html.style.backgroundColor = "#ffffff";
            html.style.color = "#111111";
          } else {
            html.classList.remove("ink-light");
            html.setAttribute("data-ink", "dark");
            html.style.backgroundColor = "#0b0b0b";
            html.style.color = "#f5f5f5";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
